<!-- Shared Scripts -->
<script src="/frontend/shared/api.js"></script>

<script>
const AUDIT_PAGE_SIZE = 25;
let auditOffset = 0;
let auditTotal = 0;
let auditFilters = {};

function _actionColor(action) {
    if (action.includes('approved') || action.includes('paid')) return 'bg-primary/10 text-primary';
    if (action.includes('rejected') || action.includes('critical') || action.includes('override')) return 'bg-error/10 text-error';
    if (action.includes('query')) return 'bg-tertiary/10 text-tertiary';
    if (action.includes('login') || action.includes('auth')) return 'bg-secondary/10 text-secondary';
    return 'bg-surface-container-high text-on-surface-variant';
}
function _dotColor(action) {
    if (action.includes('approved') || action.includes('paid')) return 'bg-primary-container';
    if (action.includes('rejected') || action.includes('override')) return 'bg-error';
    if (action.includes('query')) return 'bg-tertiary';
    if (action.includes('login') || action.includes('auth')) return 'bg-secondary';
    return 'bg-outline';
}
function _actionLabel(action) {
    return action.replace('expense.', '').replace('auth.', '').replace('system.', '').replace(/_/g, ' ').toUpperCase();
}
function _formatValue(v) {
    if (v === null || v === undefined) return '<em class="text-on-surface-variant/50">null</em>';
    if (typeof v === 'boolean') return v ? 'true' : 'false';
    if (typeof v === 'object') return '<code class="text-xs bg-surface-container-high px-1 rounded">' + JSON.stringify(v).slice(0, 120) + '</code>';
    return String(v);
}

function _renderDiff(diff) {
    if (!diff || Object.keys(diff).length === 0) return '<p class="text-sm text-on-surface-variant">No field-level diff available.</p>';
    const rows = Object.entries(diff).map(([field, vals]) => `
        <tr>
            <td class="font-mono text-xs">${field}</td>
            <td class="col-before rounded-l">${_formatValue(vals.before)}</td>
            <td class="col-after rounded-r">${_formatValue(vals.after)}</td>
        </tr>
    `).join('');
    return `
    <table class="diff-table rounded-lg overflow-hidden">
        <thead>
            <tr><th>Field</th><th class="col-before">Before</th><th class="col-after">After</th></tr>
        </thead>
        <tbody>${rows}</tbody>
    </table>`;
}

function _renderEntry(entry) {
    const ts = new Date(entry.timestamp);
    const timeStr = ts.toLocaleString('en-IN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const fullTime = ts.toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'long' });
    const details = entry.details || {};
    const detailText = entry.change_summary || (details.reason ? `Reason: ${details.reason}` :
        details.status ? `Status → ${details.status}` : '');
    const isOverride = entry.action.includes('override');
    const borderClass = isOverride ? 'border-error/20' : 'border-outline-variant/10';
    const entityLink = entry.entity_id
        ? `<a href="/frontend/accounts_payable_hub/code.html?bill_id=${entry.entity_id}" class="text-xs text-primary font-mono hover:underline">${entry.entity_id.slice(0, 8)}…</a>`
        : '';
    const displayName = entry.entity_display_name || entityLink || '';
    return `
    <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-start cursor-pointer group" onclick="openAuditDetail('${entry.id}')">
      <div class="md:col-span-1 flex justify-center pt-4">
        <div class="w-3 h-3 rounded-full ${_dotColor(entry.action)} ring-4 ring-background z-10 group-hover:scale-125 transition-transform"></div>
      </div>
      <div class="md:col-span-11">
        <div class="bg-surface-container-lowest p-5 rounded-xl signature-shadow border ${borderClass} group-hover:border-primary/30 transition-colors">
          <div class="flex justify-between items-start mb-3">
            <span class="${_actionColor(entry.action)} text-[10px] font-bold px-2 py-1 rounded">${_actionLabel(entry.action)}</span>
            <span class="text-xs text-on-surface-variant font-mono" title="${fullTime}">${timeStr}</span>
          </div>
          <h4 class="text-base font-semibold mb-1 text-on-surface">
            ${entry.entity_type}${displayName ? ' — ' + displayName : ''}
          </h4>
          ${detailText ? `<p class="text-on-surface-variant text-sm mt-1">${detailText}</p>` : ''}
          ${isOverride ? '<div class="mt-2 inline-flex items-center gap-1 bg-error/5 text-error text-xs font-bold px-2 py-1 rounded"><span class="material-symbols-outlined text-[12px]">shield</span> Superior Override</div>' : ''}
          <div class="mt-3 pt-3 border-t border-outline-variant/10 flex items-center justify-between">
            <div class="flex items-center gap-2">
              <div class="w-5 h-5 rounded-full bg-primary flex items-center justify-center text-white text-[9px] font-bold">
                ${(entry.actor || 'S')[0].toUpperCase()}
              </div>
              <span class="text-xs text-on-surface-variant">
                By <strong class="text-on-surface">${entry.actor}</strong>
                ${entry.actor_role ? `(Grade ${entry.actor_role})` : ''}
              </span>
            </div>
            <span class="material-symbols-outlined text-sm text-on-surface-variant/50 group-hover:text-primary transition-colors">chevron_right</span>
          </div>
        </div>
      </div>
    </div>`;
}

function openAuditDetail(id) {
    const entry = window._auditEntries?.find(e => e.id === id);
    if (!entry) return;
    const panel = document.getElementById('audit-modal-panel');
    const modal = document.getElementById('audit-modal');
    const content = document.getElementById('audit-modal-content');

    const ts = new Date(entry.timestamp);
    const timeStr = ts.toLocaleString('en-IN', { dateStyle: 'full', timeStyle: 'long' });
    const metaRows = [];
    if (entry.ip_address) metaRows.push({ label: 'IP Address', value: entry.ip_address });
    if (entry.request_id) metaRows.push({ label: 'Request ID', value: entry.request_id });
    if (entry.user_agent) metaRows.push({ label: 'User Agent', value: entry.user_agent });

    content.innerHTML = `
      <div class="space-y-6">
        <div>
          <div class="text-[10px] uppercase font-bold text-on-surface-variant/70 mb-1">Action</div>
          <div class="text-xl font-bold text-on-surface">${_actionLabel(entry.action)}</div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <div class="text-[10px] uppercase font-bold text-on-surface-variant/70 mb-1">Entity</div>
            <div class="text-sm font-semibold text-on-surface">${entry.entity_type}</div>
            <div class="text-xs text-primary font-mono mt-0.5">${entry.entity_display_name || entry.entity_id?.slice(0,8)+'…' || '—'}</div>
          </div>
          <div>
            <div class="text-[10px] uppercase font-bold text-on-surface-variant/70 mb-1">Actor</div>
            <div class="text-sm font-semibold text-on-surface">${entry.actor}</div>
            ${entry.actor_role ? `<div class="text-xs text-on-surface-variant">Grade ${entry.actor_role}</div>` : ''}
          </div>
        </div>
        <div>
          <div class="text-[10px] uppercase font-bold text-on-surface-variant/70 mb-1">Timestamp</div>
          <div class="text-sm text-on-surface">${timeStr}</div>
        </div>
        ${entry.change_summary ? `
        <div class="bg-primary-fixed/30 p-3 rounded-lg">
          <div class="text-[10px] uppercase font-bold text-on-primary-fixed-variant mb-1">Change Summary</div>
          <div class="text-sm text-on-surface">${entry.change_summary}</div>
        </div>` : ''}
        ${Object.keys(entry.diff || {}).length ? `
        <div>
          <div class="text-[10px] uppercase font-bold text-on-surface-variant/70 mb-2">Field Changes</div>
          ${_renderDiff(entry.diff)}
        </div>` : ''}
        ${metaRows.length ? `
        <div class="border-t border-outline-variant/30 pt-4">
          <div class="text-[10px] uppercase font-bold text-on-surface-variant/70 mb-2">Request Context</div>
          <div class="space-y-1">
            ${metaRows.map(r => `<div class="text-xs text-on-surface-variant"><strong class="text-on-surface/70">${r.label}:</strong> <span class="font-mono">${r.value}</span></div>`).join('')}
          </div>
        </div>` : ''}
        ${entry.metadata ? `
        <div class="border-t border-outline-variant/30 pt-4">
          <div class="text-[10px] uppercase font-bold text-on-surface-variant/70 mb-2">Metadata</div>
          <pre class="text-xs bg-surface-container-high p-3 rounded-lg overflow-x-auto">${JSON.stringify(entry.metadata, null, 2)}</pre>
        </div>` : ''}
      </div>
    `;

    modal.classList.remove('hidden');
    setTimeout(() => panel.classList.remove('translate-x-full'), 10);
}

function closeAuditDetail() {
    const panel = document.getElementById('audit-modal-panel');
    const modal = document.getElementById('audit-modal');
    panel.classList.add('translate-x-full');
    setTimeout(() => modal.classList.add('hidden'), 300);
}

async function loadAuditLog(reset = false) {
    if (reset) { auditOffset = 0; }
    const timeline = document.getElementById('audit-timeline');
    const loadMoreBtn = document.getElementById('audit-load-more');

    try {
        const params = { limit: AUDIT_PAGE_SIZE, offset: auditOffset, ...auditFilters };
        const data = await window.api.getAuditLog(params);
        if (!data) return;
        auditTotal = data.total || 0;
        const entries = data.results || [];

        if (reset) {
            window._auditEntries = [];
            if (entries.length === 0) {
                timeline.innerHTML = '<div class="py-16 text-center text-on-surface-variant text-sm">No audit records visible for your role.</div>';
                document.getElementById('stat-total').textContent = '0';
                document.getElementById('stat-showing').textContent = '0';
                return;
            }
            timeline.innerHTML = '';
        }
        entries.forEach(e => {
            window._auditEntries.push(e);
            const el = document.createElement('div');
            el.innerHTML = _renderEntry(e);
            timeline.appendChild(el.firstElementChild);
        });

        auditOffset += entries.length;
        document.getElementById('stat-total').textContent = auditTotal.toLocaleString();
        document.getElementById('stat-showing').textContent = `${Math.min(auditOffset, auditTotal)}`;
        if (loadMoreBtn) {
            loadMoreBtn.classList.toggle('hidden', auditOffset >= auditTotal);
        }
    } catch (e) {
        if (reset) timeline.innerHTML = `<div class="py-16 text-center text-error text-sm">Failed to load audit log: ${e.message}</div>`;
    }
}

function buildFilterState() {
    const action = document.getElementById('filter-action')?.value;
    const entity = document.getElementById('filter-entity')?.value;
    const dateFrom = document.getElementById('filter-date-from')?.value;
    const dateTo = document.getElementById('filter-date-to')?.value;
    const search = document.getElementById('top-search')?.value?.trim();
    const f = {};
    if (action) f.action = action;
    if (entity) f.entity_type = entity;
    if (dateFrom) f.date_from = dateFrom;
    if (dateTo) f.date_to = dateTo;
    if (search) f.search = search;
    return f;
}

async function exportCsv() {
    const btn = document.getElementById('export-csv-btn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Exporting…';
    btn.disabled = true;
    try {
        const params = new URLSearchParams(buildFilterState());
        const token = localStorage.getItem('accessToken');
        const resp = await fetch(`/api/v1/audit/export/?${params}`, {
            headers: token ? { 'Authorization': `Bearer ${token}` } : {}
        });
        if (!resp.ok) throw new Error('Export failed');
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const cd = resp.headers.get('content-disposition');
        a.download = cd?.match(/filename="(.+)"/)?.[1] || 'audit_export.csv';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
    } catch (e) {
        alert('Failed to export: ' + e.message);
    } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    await loadAuditLog(true);

    document.getElementById('audit-load-more')?.addEventListener('click', () => loadAuditLog(false));

    // Filter buttons
    document.getElementById('apply-filters')?.addEventListener('click', () => {
        auditFilters = buildFilterState();
        loadAuditLog(true);
    });
    document.getElementById('clear-filters')?.addEventListener('click', () => {
        document.getElementById('filter-action').value = '';
        document.getElementById('filter-entity').value = '';
        document.getElementById('filter-date-from').value = '';
        document.getElementById('filter-date-to').value = '';
        document.getElementById('top-search').value = '';
        auditFilters = {};
        loadAuditLog(true);
    });

    // Search debounce
    let searchTimeout;
    document.getElementById('top-search')?.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            auditFilters = buildFilterState();
            loadAuditLog(true);
        }, 400);
    });

    // Export
    document.getElementById('export-csv-btn')?.addEventListener('click', exportCsv);

    // Modal close
    document.getElementById('audit-modal-close')?.addEventListener('click', closeAuditDetail);
    document.getElementById('audit-modal-backdrop')?.addEventListener('click', closeAuditDetail);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeAuditDetail(); });

    // Wire sign out
    const signOutEl = document.querySelector('[data-logout]');
    if (signOutEl) {
        signOutEl.addEventListener('click', () => {
            AUTH.clearSession();
            window.location.href = '/frontend/financeai_login/code.html';
        });
    }
});
</script>
