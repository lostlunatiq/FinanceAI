<body class="bg-surface text-on-surface antialiased">
<!-- SideNavBar (Shared Component) -->

<div id="sidebar-container" class="z-40"></div>
<main class="lg:ml-64 min-h-screen">
<!-- TopNavBar -->
<div class="flex justify-between items-center px-8 w-full h-16 sticky top-0 z-40 bg-surface-container-lowest border-b border-outline-variant/30 shadow-sm">
<div class="flex items-center gap-6">
<div class="relative">

<input class="bg-surface-container-low border-none rounded-full pl-10 pr-4 py-2 text-sm w-64 focus:ring-2 focus:ring-primary/20 transition-all" placeholder="Search audit trail..." type="text"/>
</div>
</div>
<div class="flex items-center gap-4">
<button class="p-2 text-on-surface-variant hover:bg-[#f5f3f3] transition-colors rounded-full relative">

<button class="p-2 text-on-surface-variant hover:bg-[#f5f3f3] transition-colors rounded-full">

<button class="p-2 text-on-surface-variant hover:bg-[#f5f3f3] transition-colors rounded-full">

<div class="h-8 w-px bg-outline-variant/30 mx-2"></div>
<img alt="User profile" class="w-8 h-8 rounded-full object-cover" data-alt="professional headshot of a finance executive in a soft-lit modern office environment" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqS791TVyzJSw_t-u4Wu1-yz3BR2N1gjs9es8kxHD5yaM6dLnPrA_BwyRLx4uXAHIFVZYieBgk_Qcc30OfjegkKbJZVR2OOhqQHYIAwhkHWIXifBbQ9V0Hs6O4hAeOO2TQbsBW9IgHAM3syTqL7nvXt5zyIhgVKlgZmBvdcLe7SzCmTpAgi5breIwFXkGLV1Ew4mj16PVrRK7GuP1oY0bqlJE2U17OI-byuNiS-lm9Y4CpZgcA6tzLbMNt1JNbBNEz0m9yJ693KAqm"/>
</div>
</div>
<div class="p-8 max-w-7xl mx-auto">
<!-- Page Title & Primary Actions -->
<div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-12">
<div>
<h1 class="text-2xl font-extrabold tracking-tight font-headline text-primary mb-2">Audit Registry</h1>
<p class="text-on-surface-variant text-lg max-w-xl leading-relaxed">A permanent, immutable record of every transaction and system alteration within the FinanceAI ecosystem.</p>
</div>
<button class="primary-gradient text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 signature-shadow active:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="file_download">file_download</span>
                    Export to CSV
                </button>
</div>
<!-- Contextual Filters Section -->
<section class="bg-surface-container-low p-6 rounded-xl mb-8 flex flex-wrap gap-4 items-center">
<div class="flex-1 min-w-[200px]">
<label class="block text-[10px] uppercase font-bold text-on-surface-variant/70 mb-1 ml-1">Action Type</label>
<select id="filter-action" class="w-full bg-surface-container-lowest border-none rounded-lg text-sm px-3 py-2.5 focus:ring-2 focus:ring-primary/20">
<option value="">All Actions</option>
<option value="approved">Approvals</option>
<option value="rejected">Rejections</option>
<option value="submitted">Submissions</option>
<option value="query">Queries</option>
<option value="override">Superior Override</option>
<option value="paid">Payments</option>
<option value="vendor">Vendor Changes</option>
</select>
</div>
<div class="flex-1 min-w-[200px]">
<label class="block text-[10px] uppercase font-bold text-on-surface-variant/70 mb-1 ml-1">Entity Type</label>
<select id="filter-entity" class="w-full bg-surface-container-lowest border-none rounded-lg text-sm px-3 py-2.5 focus:ring-2 focus:ring-primary/20">
<option value="">All Entities</option>
<option value="Expense">Invoices / Expenses</option>
<option value="Vendor">Vendor</option>
<option value="User">User / Auth</option>
</select>
</div>
<div class="flex items-end h-full self-end gap-2">
<button id="apply-filters" class="primary-gradient text-white px-5 py-2.5 rounded-lg font-bold text-sm transition-opacity hover:opacity-90">
  Apply
</button>
<button id="clear-filters" class="bg-surface-container-high text-primary px-5 py-2.5 rounded-lg font-bold text-sm hover:bg-surface-container-highest transition-colors">
  Clear
</button>
</div>
</section>
<!-- Timeline-Style Audit Log (Live Data) -->
<div class="relative">
<div class="absolute left-[31px] top-0 bottom-0 w-px bg-outline-variant/20 hidden md:block"></div>
<!-- Live log entries injected here -->
<div id="audit-timeline" class="space-y-8">
  <div class="flex items-center justify-center py-16 text-on-surface-variant">
    <span class="material-symbols-outlined animate-spin mr-2">refresh</span> Loading audit records...
  </div>
</div>
<!-- Pagination -->
<div class="mt-12 flex justify-center gap-3" id="audit-pagination">
  <button id="audit-load-more" class="hidden bg-surface-container-lowest border border-outline-variant/30 text-on-surface-variant px-10 py-3 rounded-xl font-semibold hover:bg-surface-container-low transition-colors signature-shadow">
    Load more records
  </button>
</div>
</div>
</div>
</main>
<!-- Glassmorphism Command Palette (Contextual FAB Replacement for High-Focus Page) -->
<div class="fixed bottom-8 right-8 z-50">
<button class="w-14 h-14 primary-gradient text-white rounded-full flex items-center justify-center shadow-2xl active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
</div>
<!-- Shared Scripts -->
<script src="/frontend/shared/api.js"></script>
<script src="/frontend/shared/auth.js"></script>
<script>
const AUDIT_PAGE_SIZE = 25;
let auditOffset = 0;
let auditTotal = 0;
let auditFilters = {};

function _actionColor(action) {
    if (action.includes('approved') || action.includes('paid')) return 'bg-primary/10 text-primary';
    if (action.includes('rejected') || action.includes('critical') || action.includes('override')) return 'bg-error/10 text-error';
    if (action.includes('query')) return 'bg-tertiary/10 text-tertiary';
    return 'bg-secondary/10 text-secondary';
}
function _dotColor(action) {
    if (action.includes('approved') || action.includes('paid')) return 'bg-primary-container';
    if (action.includes('rejected') || action.includes('override')) return 'bg-error';
    if (action.includes('query')) return 'bg-tertiary';
    return 'bg-outline';
}
function _actionLabel(action) {
    return action.replace('expense.', '').replace(/_/g, ' ').toUpperCase();
}
function _renderEntry(entry) {
    const ts = new Date(entry.timestamp);
    const timeStr = ts.toLocaleString('en-IN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const details = entry.details || {};
    const detailText = details.reason ? `Reason: ${details.reason}` :
        details.status ? `Status → ${details.status}` : '';
    const isOverride = entry.action.includes('override');
    const borderClass = isOverride ? 'border-error/20' : 'border-outline-variant/10';
    const entityLink = entry.entity_id
        ? `<a href="/frontend/accounts_payable_hub/code.html?bill_id=${entry.entity_id}" class="text-xs text-primary font-mono hover:underline">${entry.entity_id.slice(0, 8)}…</a>`
        : '';
    return `
    <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
      <div class="md:col-span-1 flex justify-center pt-4">
        <div class="w-3 h-3 rounded-full ${_dotColor(entry.action)} ring-4 ring-background z-10"></div>
      </div>
      <div class="md:col-span-8">
        <div class="bg-surface-container-lowest p-5 rounded-xl signature-shadow border ${borderClass}">
          <div class="flex justify-between items-start mb-3">
            <span class="${_actionColor(entry.action)} text-[10px] font-bold px-2 py-1 rounded">${_actionLabel(entry.action)}</span>
            <span class="text-xs text-on-surface-variant font-mono">${timeStr}</span>
          </div>
          <h4 class="text-base font-semibold mb-1 text-on-surface">
            ${entry.entity_type}${entry.entity_id ? ' — ' : ''}${entityLink}
          </h4>
          ${detailText ? `<p class="text-on-surface-variant text-sm">${detailText}</p>` : ''}
          ${isOverride ? '<div class="mt-2 inline-flex items-center gap-1 bg-error/5 text-error text-xs font-bold px-2 py-1 rounded"><span class="material-symbols-outlined text-[12px]">shield</span> Superior Override</div>' : ''}
          <div class="mt-3 pt-3 border-t border-outline-variant/10 flex items-center gap-2">
            <div class="w-5 h-5 rounded-full bg-primary flex items-center justify-center text-white text-[9px] font-bold">
              ${(entry.actor || 'S')[0].toUpperCase()}
            </div>
            <span class="text-xs text-on-surface-variant">
              By <strong class="text-on-surface">${entry.actor}</strong>
              ${entry.actor_role ? `(Grade ${entry.actor_role})` : ''}
            </span>
          </div>
        </div>
      </div>
    </div>`;
}

async function loadAuditLog(reset = false) {
    if (reset) { auditOffset = 0; }
    const timeline = document.getElementById('audit-timeline');
    const loadMoreBtn = document.getElementById('audit-load-more');

    try {
        const params = { limit: AUDIT_PAGE_SIZE, offset: auditOffset, ...auditFilters };
        const data = await window.api.getAuditLog(params);
        if (!data) return;
        auditTotal = data.total || 0;
        const entries = data.results || [];

        if (reset) {
            if (entries.length === 0) {
                timeline.innerHTML = '<div class="py-16 text-center text-on-surface-variant text-sm">No audit records visible for your role.</div>';
                return;
            }
            timeline.innerHTML = '';
        }
        entries.forEach(e => {
            const el = document.createElement('div');
            el.innerHTML = _renderEntry(e);
            timeline.appendChild(el.firstElementChild);
        });

        auditOffset += entries.length;
        if (loadMoreBtn) {
            loadMoreBtn.classList.toggle('hidden', auditOffset >= auditTotal);
        }
    } catch (e) {
        if (reset) timeline.innerHTML = `<div class="py-16 text-center text-error text-sm">Failed to load audit log: ${e.message}</div>`;
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    await loadAuditLog(true);

    document.getElementById('audit-load-more')?.addEventListener('click', () => loadAuditLog(false));

    // Filter buttons
    document.getElementById('apply-filters')?.addEventListener('click', () => {
        auditFilters = {};
        const action = document.getElementById('filter-action')?.value;
        const entity = document.getElementById('filter-entity')?.value;
        if (action) auditFilters.action = action;
        if (entity) auditFilters.entity_type = entity;
        loadAuditLog(true);
    });
    document.getElementById('clear-filters')?.addEventListener('click', () => {
        auditFilters = {};
        document.getElementById('filter-action').value = '';
        document.getElementById('filter-entity').value = '';
        loadAuditLog(true);
    });

    // Wire sign out
    const signOutEl = document.querySelector('[data-logout]');
    if (signOutEl) {
        signOutEl.addEventListener('click', () => {
            AUTH.clearSession();
            window.location.href = '/frontend/financeai_login/code.html';
        });
    }
});
</script>
<script src="/frontend/shared/layout.js"></script>
</body></html>
