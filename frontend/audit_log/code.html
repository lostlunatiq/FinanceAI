<html class="light" lang="en"><head>

                      "surface-container-lowest": "#ffffff",

                      "on-tertiary-fixed-variant": "#5f00c0",
                      "background": "#fbf9f9",
                      "secondary-container": "#bcd2fe",
                      "error-container": "#ffdad6",
                      "surface": "#fbf9f9",
                      "primary": "#00535b",
                      "on-secondary-container": "#445a7f",
                      "primary-container": "#006d77",
                      "surface-bright": "#fbf9f9",
                      "on-tertiary-container": "#e9d7ff",
                      "on-surface": "#1b1c1c",
                      "tertiary-fixed-dim": "#d5baff",
                      "on-error-container": "#93000a",
                      "surface-container-highest": "#e3e2e2",
                      "on-primary": "#ffffff",
                      "outline-variant": "#bec8ca",
                      "on-error": "#ffffff",
                      "primary-fixed": "#9ff0fb",
                      "inverse-primary": "#82d3de",
                      "secondary": "#495f84",
                      "on-surface-variant": "#3e494a",
                      "secondary-fixed-dim": "#b1c7f2",
                      "on-primary-fixed": "#001f23",
                      "primary-fixed-dim": "#82d3de",
                      "on-background": "#1b1c1c",
                      "secondary-fixed": "#d6e3ff",
                      "tertiary-container": "#7d30e6",
                      "inverse-on-surface": "#f2f0f0",
                      "surface-container": "#efeded",
                      "on-tertiary-fixed": "#270057"

              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",

                      "full": "0.75rem"

              "fontFamily": {

                      "label": ["Inter"]

</head>
<body class="bg-surface text-on-surface antialiased">
<!-- SideNavBar (Shared Component) -->

<div id="sidebar-container" class="z-40"></div>
<main class="lg:ml-64 min-h-screen">
<!-- TopNavBar -->
<div class="flex justify-between items-center px-8 w-full h-16 sticky top-0 z-40 bg-surface-container-lowest border-b border-outline-variant/30 shadow-sm">
<div class="flex items-center gap-6">
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant material-symbols-outlined text-sm" data-icon="search">search</span>
<input class="bg-surface-container-low border-none rounded-full pl-10 pr-4 py-2 text-sm w-64 focus:ring-2 focus:ring-primary/20 transition-all" placeholder="Search audit trail..." type="text"/>
</div>
</div>
<div class="flex items-center gap-4">
<button class="p-2 text-on-surface-variant hover:bg-[#f5f3f3] transition-colors rounded-full relative">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
<span class="absolute top-2 right-2 w-2 h-2 bg-error rounded-full border-2 border-surface"></span>
</button>
<button class="p-2 text-on-surface-variant hover:bg-[#f5f3f3] transition-colors rounded-full">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
<button class="p-2 text-on-surface-variant hover:bg-[#f5f3f3] transition-colors rounded-full">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<div class="h-8 w-px bg-outline-variant/30 mx-2"></div>
<img alt="User profile" class="w-8 h-8 rounded-full object-cover" data-alt="professional headshot of a finance executive in a soft-lit modern office environment" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqS791TVyzJSw_t-u4Wu1-yz3BR2N1gjs9es8kxHD5yaM6dLnPrA_BwyRLx4uXAHIFVZYieBgk_Qcc30OfjegkKbJZVR2OOhqQHYIAwhkHWIXifBbQ9V0Hs6O4hAeOO2TQbsBW9IgHAM3syTqL7nvXt5zyIhgVKlgZmBvdcLe7SzCmTpAgi5breIwFXkGLV1Ew4mj16PVrRK7GuP1oY0bqlJE2U17OI-byuNiS-lm9Y4CpZgcA6tzLbMNt1JNbBNEz0m9yJ693KAqm"/>
</div>
</div>
<div class="p-8 max-w-7xl mx-auto">
<!-- Page Title & Primary Actions -->
<div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-12">
<div>
<h1 class="text-2xl font-extrabold tracking-tight font-headline text-primary mb-2">Audit Registry</h1>
<p class="text-on-surface-variant text-lg max-w-xl leading-relaxed">A permanent, immutable record of every transaction and system alteration within the FinanceAI ecosystem.</p>
</div>
<button id="export-csv-btn" class="primary-gradient text-white px-6 py-3 rounded-xl font-bold flex items-center gap-2 signature-shadow active:opacity-80 transition-opacity">
<span class="material-symbols-outlined">file_download</span>
Export to CSV
</button>
</div>
<!-- Filters -->
<section class="bg-surface-container-low p-6 rounded-xl mb-8 flex flex-wrap gap-4 items-center">
<div class="flex-1 min-w-[200px]">
<label class="block text-[10px] uppercase font-bold text-on-surface-variant/70 mb-1 ml-1">Action Type</label>
<select id="filter-action" class="w-full bg-surface-container-lowest border-none rounded-lg text-sm px-3 py-2.5 focus:ring-2 focus:ring-primary/20">
<option value="">All Actions</option>
<option value="expense">Expense Events</option>
<option value="vendor">Vendor Events</option>
<option value="user">User Events</option>
</select>
</div>
<div class="flex-1 min-w-[200px]">
<label class="block text-[10px] uppercase font-bold text-on-surface-variant/70 mb-1 ml-1">Search</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[16px]">search</span>
<input id="filter-search" type="text" placeholder="Search actions, actors…"
    class="w-full pl-9 pr-4 py-2.5 bg-surface-container-lowest border-none rounded-lg text-sm focus:ring-2 focus:ring-primary/20"/>
</div>
</div>
<div class="flex items-end self-end">
<button id="clear-filters-btn" class="bg-surface-container-high text-primary px-5 py-2.5 rounded-lg font-bold text-sm hover:bg-surface-container-highest transition-colors">
Clear Filters
</button>
</div>
<div class="ml-auto flex items-end self-end">
<span id="audit-total" class="text-xs text-on-surface-variant font-medium">Loading…</span>
</div>
</section>
<!-- Summary Cards -->
<div id="audit-stats" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>
<!-- Timeline -->
<div class="relative">
<div class="absolute left-[31px] top-0 bottom-0 w-px bg-outline-variant/20 hidden md:block"></div>
<div id="audit-timeline" class="space-y-6">
<div class="flex items-center justify-center py-16 text-on-surface-variant">
<span class="material-symbols-outlined animate-spin mr-2">progress_activity</span> Loading audit records…
</div>
</div>
</div>
<!-- Pagination -->
<div class="mt-12 flex justify-center gap-3" id="audit-pagination"></div>
</div>
</main>

<!-- Search FAB -->
<div class="fixed bottom-8 right-8 z-50">
<button id="search-fab" class="w-14 h-14 primary-gradient text-white rounded-full flex items-center justify-center shadow-2xl active:scale-95 transition-transform" title="Search audit log">
<span class="material-symbols-outlined">search</span>
</button>
</div>

<!-- Shared Scripts -->
<script src="/frontend/shared/api.js"></script>
<script src="/frontend/shared/auth.js"></script>
<script>
const AUDIT = {
    offset: 0,
    limit: 20,
    action: '',
    search: '',
    total: 0,

    async load() {
        const timeline = document.getElementById('audit-timeline');
        const totalEl = document.getElementById('audit-total');
        timeline.innerHTML = `<div class="flex items-center justify-center py-16 text-on-surface-variant">
            <span class="material-symbols-outlined animate-spin mr-2">progress_activity</span> Loading…</div>`;

        const params = { limit: this.limit, offset: this.offset };
        if (this.action) params.action = this.action;

        try {
            const data = await window.api.getAuditLog(params);
            if (!data) return;

            this.total = data.total || 0;
            totalEl.textContent = `${this.total.toLocaleString()} total records`;

            let results = data.results || [];
            if (this.search) {
                const q = this.search.toLowerCase();
                results = results.filter(r =>
                    r.action?.toLowerCase().includes(q) ||
                    r.actor?.toLowerCase().includes(q) ||
                    r.entity_type?.toLowerCase().includes(q)
                );
            }

            this._renderTimeline(results);
            this._renderPagination();
            this._renderStats(data.results || []);
        } catch (e) {
            timeline.innerHTML = `<div class="text-error text-center py-8">Failed to load audit log: ${e.message}</div>`;
        }
    },

    _actionColor(action) {
        if (action.includes('approved') || action.includes('paid')) return { bg: 'bg-green-100', text: 'text-green-800', dot: 'bg-green-500' };
        if (action.includes('reject') || action.includes('error')) return { bg: 'bg-red-100', text: 'text-red-800', dot: 'bg-red-500' };
        if (action.includes('vendor')) return { bg: 'bg-blue-100', text: 'text-blue-800', dot: 'bg-blue-500' };
        if (action.includes('login') || action.includes('user')) return { bg: 'bg-purple-100', text: 'text-purple-800', dot: 'bg-purple-500' };
        return { bg: 'bg-primary/10', text: 'text-primary', dot: 'bg-primary' };
    },

    _renderTimeline(entries) {
        const timeline = document.getElementById('audit-timeline');
        if (!entries.length) {
            timeline.innerHTML = `<div class="text-center py-16 text-on-surface-variant">
                <span class="material-symbols-outlined text-4xl block mb-3 opacity-40">history</span>
                No audit records found for this filter.</div>`;
            return;
        }

        timeline.innerHTML = entries.map(entry => {
            const c = this._actionColor(entry.action || '');
            const ts = new Date(entry.timestamp);
            const timeStr = ts.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) +
                ' · ' + ts.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
            const actionLabel = (entry.action || '').replace('.', ' › ').toUpperCase();
            const details = entry.details ? Object.entries(entry.details).map(([k,v]) =>
                `<div class="flex justify-between text-[11px]"><span class="text-on-surface-variant capitalize">${k}</span><span class="text-on-surface font-medium ml-4 truncate max-w-[180px]">${v}</span></div>`
            ).join('') : '';

            const initials = (entry.actor || 'SYS').split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();

            return `
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
                <div class="md:col-span-1 flex justify-center pt-2">
                    <div class="w-3 h-3 rounded-full ${c.dot} ring-4 ring-background z-10 mt-1"></div>
                </div>
                <div class="md:col-span-8">
                    <div class="bg-surface-container-lowest p-5 rounded-xl signature-shadow border border-outline-variant/10">
                        <div class="flex justify-between items-start mb-3">
                            <span class="${c.bg} ${c.text} text-[10px] font-bold px-2 py-1 rounded">${actionLabel}</span>
                            <span class="text-[10px] text-on-surface-variant/60 font-mono">${entry.entity_type || ''}</span>
                        </div>
                        <p class="text-sm text-on-surface-variant">${entry.details?.description || entry.details?.reason || entry.action || ''}</p>
                        <div class="mt-3 pt-3 border-t border-outline-variant/10 flex items-center gap-2">
                            <div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center text-white text-[9px] font-bold">${initials}</div>
                            <span class="text-xs text-on-surface-variant">
                                <strong class="text-on-surface">${entry.actor || 'System'}</strong>
                                <span class="opacity-60"> · ${entry.actor_role || ''}</span>
                                <span class="ml-2 opacity-50">${timeStr}</span>
                            </span>
                        </div>
                    </div>
                </div>
                ${details ? `<div class="md:col-span-3 hidden md:block">
                    <div class="p-4 bg-surface-container-low/60 rounded-xl space-y-1">${details}</div>
                </div>` : ''}
            </div>`;
        }).join('');
    },

    _renderPagination() {
        const el = document.getElementById('audit-pagination');
        if (this.total <= this.limit) { el.innerHTML = ''; return; }

        const pages = Math.ceil(this.total / this.limit);
        const current = Math.floor(this.offset / this.limit);
        let html = '';

        if (current > 0) html += `<button data-page="${current - 1}" class="px-4 py-2 rounded-lg border border-outline-variant/30 hover:bg-surface-container-low text-sm font-medium transition-colors">Previous</button>`;

        for (let i = Math.max(0, current-2); i <= Math.min(pages-1, current+2); i++) {
            const active = i === current ? 'bg-primary text-white' : 'hover:bg-surface-container-low text-on-surface-variant';
            html += `<button data-page="${i}" class="px-4 py-2 rounded-lg border border-outline-variant/30 text-sm font-medium transition-colors ${active}">${i+1}</button>`;
        }

        if (current < pages - 1) html += `<button data-page="${current + 1}" class="px-4 py-2 rounded-lg border border-outline-variant/30 hover:bg-surface-container-low text-sm font-medium transition-colors">Next</button>`;

        el.innerHTML = html;
        el.querySelectorAll('[data-page]').forEach(btn => {
            btn.addEventListener('click', () => {
                this.offset = parseInt(btn.dataset.page) * this.limit;
                this.load();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    },

    _renderStats(entries) {
        const el = document.getElementById('audit-stats');
        const counts = {};
        entries.forEach(e => {
            const type = (e.action || '').split('.')[0] || 'other';
            counts[type] = (counts[type] || 0) + 1;
        });
        const cards = Object.entries(counts).slice(0, 4).map(([k, v]) => `
            <div class="bg-surface-container-lowest p-4 rounded-xl border border-outline-variant/10 signature-shadow">
                <p class="text-[10px] uppercase font-bold text-on-surface-variant/60 mb-1">${k} events</p>
                <p class="text-2xl font-bold text-primary">${v}</p>
            </div>`).join('');
        el.innerHTML = cards;
    },

    exportCSV() {
        const token = localStorage.getItem('financeai_access_token');
        const params = new URLSearchParams({ limit: 500, offset: 0 });
        if (this.action) params.set('action', this.action);

        window.api.getAuditLog(Object.fromEntries(params)).then(data => {
            if (!data?.results?.length) { _showToast('No data to export.', 'warning'); return; }
            const rows = [['ID', 'Action', 'Actor', 'Role', 'Entity', 'Timestamp', 'Details']];
            data.results.forEach(r => rows.push([
                r.id, r.action, r.actor, r.actor_role, r.entity_type,
                r.timestamp, JSON.stringify(r.details || {})
            ]));
            const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `audit_log_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            _showToast('CSV exported successfully.', 'success');
        });
    },
};

document.addEventListener('DOMContentLoaded', () => {
    AUDIT.load();

    document.getElementById('export-csv-btn')?.addEventListener('click', () => AUDIT.exportCSV());

    document.getElementById('filter-action')?.addEventListener('change', (e) => {
        AUDIT.action = e.target.value;
        AUDIT.offset = 0;
        AUDIT.load();
    });

    document.getElementById('filter-search')?.addEventListener('input', (e) => {
        AUDIT.search = e.target.value.trim();
        AUDIT.offset = 0;
        AUDIT.load();
    });

    document.getElementById('clear-filters-btn')?.addEventListener('click', () => {
        document.getElementById('filter-action').value = '';
        document.getElementById('filter-search').value = '';
        AUDIT.action = '';
        AUDIT.search = '';
        AUDIT.offset = 0;
        AUDIT.load();
        _showToast('Filters cleared.');
    });

    document.getElementById('search-fab')?.addEventListener('click', () => {
        document.getElementById('filter-search')?.focus();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
});
</script>
<script src="/frontend/shared/layout.js"></script>
</body></html>
