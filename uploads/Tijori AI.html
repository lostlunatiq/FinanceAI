<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tijori AI — Enterprise Finance OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #E8783B; --orange-hot: #FF6B35;
      --slate-950: #020617; --slate-900: #0F172A; --slate-800: #1E293B;
      --slate-600: #475569; --slate-400: #94A3B8;
      --warm-white: #FAFAF8; --green: #10B981; --amber: #F59E0B;
      --red: #EF4444; --purple: #8B5CF6;
    }

    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #FAFAF8; color: #0F172A; }
    #root { height: 100vh; display: flex; flex-direction: column; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

    input, textarea, button { font-family: inherit; }
    button { outline: none; }

    @keyframes fadeIn    { from { opacity: 0 } to { opacity: 1 } }
    @keyframes fadeUp    { from { opacity: 0; transform: translateY(14px) } to { opacity: 1; transform: none } }
    @keyframes slideUp   { from { opacity: 0; transform: translateY(24px) } to { opacity: 1; transform: none } }
    @keyframes slideInRight { from { transform: translateX(100%) } to { transform: none } }
    @keyframes shimmer   { from { transform: translateX(-200%) } to { transform: translateX(300%) } }
    @keyframes spin      { to { transform: rotate(360deg) } }
    @keyframes dotPulse  { 0%,100% { transform: scale(1); opacity: 1 } 50% { transform: scale(1.5); opacity: 0.5 } }
    @keyframes borderPulse { 0%,100% { border-left-color: rgba(239,68,68,0.4) } 50% { border-left-color: rgba(239,68,68,1) } }
    @keyframes glowPulse { 0%,100% { box-shadow: 0 0 24px rgba(232,120,59,0.5) } 50% { box-shadow: 0 0 40px rgba(232,120,59,0.8) } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    /* Tweaks panel */
    #tweaks-panel {
      position: fixed; bottom: 88px; right: 24px; width: 260px;
      background: white; border-radius: 16px; border: 1px solid #E2E8F0;
      box-shadow: 0 16px 48px rgba(0,0,0,0.14); padding: 20px;
      z-index: 9999; display: none; font-family: 'Plus Jakarta Sans', sans-serif;
      animation: fadeUp 200ms ease both;
    }
    #tweaks-panel.open { display: block; }
    .tweak-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #94A3B8; margin-bottom: 6px; }
    .tweak-title { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 15px; color: #0F172A; margin-bottom: 14px; letter-spacing: -0.5px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <div id="tweaks-panel">
    <div class="tweak-label">Design Controls</div>
    <div class="tweak-title">Tweaks</div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <div class="tweak-label" style="margin-bottom:6px;">Accent Color</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <div class="swatch" data-color="#E8783B" style="width:28px;height:28px;border-radius:8px;background:#E8783B;cursor:pointer;border:2px solid #E8783B;box-shadow:0 0 0 2px white inset;"></div>
          <div class="swatch" data-color="#3B82F6" style="width:28px;height:28px;border-radius:8px;background:#3B82F6;cursor:pointer;border:2px solid transparent;"></div>
          <div class="swatch" data-color="#10B981" style="width:28px;height:28px;border-radius:8px;background:#10B981;cursor:pointer;border:2px solid transparent;"></div>
          <div class="swatch" data-color="#8B5CF6" style="width:28px;height:28px;border-radius:8px;background:#8B5CF6;cursor:pointer;border:2px solid transparent;"></div>
          <div class="swatch" data-color="#F59E0B" style="width:28px;height:28px;border-radius:8px;background:#F59E0B;cursor:pointer;border:2px solid transparent;"></div>
        </div>
      </div>
      <div>
        <div class="tweak-label" style="margin-bottom:6px;">Sidebar Tone</div>
        <div style="display:flex;gap:8px;">
          <div class="sidebar-swatch" data-bg="#020617" style="width:32px;height:32px;border-radius:8px;background:#020617;cursor:pointer;border:2px solid #020617;box-shadow:0 0 0 2px white inset;"></div>
          <div class="sidebar-swatch" data-bg="#0F172A" style="width:32px;height:32px;border-radius:8px;background:#0F172A;cursor:pointer;border:2px solid transparent;"></div>
          <div class="sidebar-swatch" data-bg="#1E3A5F" style="width:32px;height:32px;border-radius:8px;background:#1E3A5F;cursor:pointer;border:2px solid transparent;"></div>
          <div class="sidebar-swatch" data-bg="#1C1917" style="width:32px;height:32px;border-radius:8px;background:#1C1917;cursor:pointer;border:2px solid transparent;"></div>
        </div>
      </div>
      <div>
        <div class="tweak-label" style="margin-bottom:6px;">Canvas Background</div>
        <div style="display:flex;gap:8px;">
          <div class="canvas-swatch" data-bg="#FAFAF8" style="width:32px;height:32px;border-radius:8px;background:#FAFAF8;cursor:pointer;border:2px solid #E2E8F0;box-shadow:0 0 0 2px #E8783B inset;"></div>
          <div class="canvas-swatch" data-bg="#F8FAFC" style="width:32px;height:32px;border-radius:8px;background:#F8FAFC;cursor:pointer;border:2px solid #E2E8F0;"></div>
          <div class="canvas-swatch" data-bg="#FFFFFF" style="width:32px;height:32px;border-radius:8px;background:#FFFFFF;cursor:pointer;border:2px solid #E2E8F0;"></div>
          <div class="canvas-swatch" data-bg="#FFF7ED" style="width:32px;height:32px;border-radius:8px;background:#FFF7ED;cursor:pointer;border:2px solid #E2E8F0;"></div>
        </div>
      </div>
      <div>
        <div class="tweak-label" style="margin-bottom:6px;">User Role</div>
        <select id="role-select" style="width:100%;padding:7px 10px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:12px;font-family:'Plus Jakarta Sans',sans-serif;color:#0F172A;background:#FAFAF8;outline:none;cursor:pointer;">
          <option value="CFO">CFO</option>
          <option value="Finance Admin">Finance Admin</option>
          <option value="AP Clerk">AP Clerk</option>
          <option value="Vendor">Vendor</option>
        </select>
      </div>
    </div>
  </div>

  <script>
    // Tweak panel logic
    window.addEventListener('message', (e) => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('open');
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('open');
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#E8783B",
      "sidebarBg": "#020617",
      "canvasBg": "#F8FAFC",
      "role": "CFO"
    }/*EDITMODE-END*/;

    function applyTweaks(t) {
      document.documentElement.style.setProperty('--orange', t.accentColor);
      document.documentElement.style.setProperty('--orange-hot', t.accentColor + 'dd');
      document.body.style.background = t.canvasBg;
    }
    applyTweaks(TWEAK_DEFAULTS);

    document.querySelectorAll('.swatch').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.swatch').forEach(s => s.style.boxShadow = 'none');
        el.style.boxShadow = '0 0 0 2px white inset';
        el.style.borderColor = el.dataset.color;
        applyTweaks({ ...TWEAK_DEFAULTS, accentColor: el.dataset.color });
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: el.dataset.color } }, '*');
      });
    });

    document.querySelectorAll('.sidebar-swatch').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.sidebar-swatch').forEach(s => { s.style.boxShadow = 'none'; s.style.borderColor = 'transparent'; });
        el.style.boxShadow = '0 0 0 2px white inset'; el.style.borderColor = el.dataset.bg;
        document.querySelectorAll('[data-sidebar]').forEach(s => s.style.background = el.dataset.bg);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { sidebarBg: el.dataset.bg } }, '*');
      });
    });

    // Role selector wires to app via custom event
    const roleSelect = document.getElementById('role-select');
    if (roleSelect) {
      roleSelect.value = localStorage.getItem('tj_role') || 'CFO';
      roleSelect.addEventListener('change', () => {
        window.dispatchEvent(new CustomEvent('rolechange', { detail: roleSelect.value }));
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { role: roleSelect.value } }, '*');
      });
    }

    document.querySelectorAll('.canvas-swatch').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.canvas-swatch').forEach(s => s.style.boxShadow = 'none');
        el.style.boxShadow = '0 0 0 2px #E8783B inset';
        document.body.style.background = el.dataset.bg;
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { canvasBg: el.dataset.bg } }, '*');
      });
    });
  </script>

  <script type="text/babel" src="js/DS.jsx"></script>
  <script type="text/babel" src="js/Login.jsx"></script>
  <script type="text/babel" src="js/Dashboard.jsx"></script>
  <script type="text/babel" src="js/APHub.jsx"></script>
  <script type="text/babel" src="js/Anomaly.jsx"></script>
  <script type="text/babel" src="js/Secondary.jsx"></script>
  <script type="text/babel" src="js/PersonaDashboards.jsx"></script>
  <script type="text/babel" src="js/IAM.jsx"></script>
  <script type="text/babel" src="js/AR.jsx"></script>
  <script type="text/babel" src="js/App.jsx"></script>
</body>
</html>
