# Shared config for all Django-based services (web, celery, celery-beat)
x-django-common: &django-common
  build:
    context: .
    dockerfile: docker/Dockerfile
  volumes:
    - .:/app
  env_file: .env
  environment:
    DJANGO_SETTINGS_MODULE: config.settings.base
    DATABASE_URL: postgresql://postgres:postgres@db:5432/finance_ai
    REDIS_URL: redis://redis:6379/0
    UV_LINK_MODE: copy
    UV_PROJECT_ENVIRONMENT: /usr/local/
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: finance_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    <<: *django-common
    command: uv run uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  celery:
    <<: *django-common
    entrypoint: []
    # Consume all queues in dev; split into separate workers per queue in production
    command: uv run celery -A config worker -Q default,ocr,anomaly,analytics --loglevel=info

  celery-beat:
    <<: *django-common
    entrypoint: []
    command: >
      uv run celery -A config beat --loglevel=info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler


volumes:
  pg_data:
