services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: finance_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: hackathon-clickhouse
    environment:
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_PASSWORD=
    ports:
      - "8123:8123"  # HTTP port (Django connects here)
      - "9000:9000"  # Native TCP port (clickhouse-client connects here)
    volumes:
      - ch_data:/var/lib/clickhouse
      # Mounts for your C++ hacking later
      # - ./clickhouse_configs/user_scripts:/var/lib/clickhouse/user_scripts
      # - ./clickhouse_configs/config.d:/etc/clickhouse-server/config.d
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: uv run python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/finance_ai
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_HOST: clickhouse
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /usr/local/
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      clickhouse:
        condition: service_healthy
volumes:
  ch_data:
