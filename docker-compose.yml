services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: finance_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres=======
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: financeai
      CLICKHOUSE_SKIP_USER_SETUP: 1
    volumes:
      - ch_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5


  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: uv run uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgresql://postgres:postgres@db:5432/finance_ai
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DATABASE: financeai
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /usr/local/
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      clickhouse:
        condition: service_healthy

  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: uv run celery -A config worker --loglevel=info --concurrency=4 -Q default,ocr,anomaly,analytics
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgresql://postgres:postgres@db:5432/finance_ai
      REDIS_URL: redis://redis:6379/0
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      CLICKHOUSE_DATABASE: financeai
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /usr/local/
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      clickhouse:
        condition: service_healthy

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: uv run celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgresql://postgres:postgres@db:5432/finance_ai
      REDIS_URL: redis://redis:6379/0
      UV_LINK_MODE: copy
      UV_PROJECT_ENVIRONMENT: /usr/local/
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
volumes:
  ch_data:
